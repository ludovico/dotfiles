- defaults:
    link:
        relink: true

- clean: 
    ~/:
    ~/.config:
        # recursive: true

- link:
    ~/.config/ccstatusline:
        create: true
        path: ccstatusline
    ~/.claude:
        create: true
        path: claude
    ~/.config/nvim:
        create: true
        path: nvim
    ~/.config/direnv/direnvrc:
        create: true
        path: direnv/direnvrc
    ~/.config/gitignore:
        create: true
        path: gitignore
    ~/.config/ghostty:
        create: true
        path: ghostty
    ~/.config/mutt:
        create: true
        path: mutt
    ~/.config/newsboat:
        create: true
        path: newsboat
    ~/.notmuch-config:
        create: true
        path: notmuch-config
    ~/.config/vdirsyncer/config:
        create: true
        path: vdirsyncer/config
    ~/.config/msmtp/config:
        create: true
        path: msmtp/config
    ~/.config/jiratui/config.yaml:
        create: true
        path: jiratui/config.yaml
    ~/.config/vdirsyncer/get-username.sh: vdirsyncer/get-username.sh
    ~/.config/vdirsyncer/get-password.sh: vdirsyncer/get-password.sh
    ~/.config/khard:
        create: true
        path: khard
    ~/.mbsyncrc: mbsyncrc
    ~/.taskrc: taskrc
    ~/.dotfiles: ''
    ~/.tmux.conf: tmux.conf
    ~/.aerospace.toml: aerospace.toml
    ~/.tmux.conf.local: tmux.conf.local
    ~/.tmux: tmux
    ~/.zshrc: zshrc
    ~/.zprofile: zprofile
    ~/.zshenv: zshenv
    ~/bin: bin
    ~/.bunches: bunches
    ~/.xinitrc:
        if: '[ `uname` = Linux ]'
        path: xinitrc

- create:
    - ~/.zsh/histfile

- shell:
    - [git submodule update --init --recursive, Installing submodules]
